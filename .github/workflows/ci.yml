name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: './TrueLens/package-lock.json'
    - name: Install Dependencies
      run: cd TrueLens && npm ci
    - name: Build
      run: cd TrueLens && npm run build
      env:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "mock_key_for_build"
        CLERK_SECRET_KEY: "mock_key_for_build"

  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd backend
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Check Syntax (Compile)
      run: |
        cd backend
        python -m compileall app
